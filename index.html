<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ennio Chiesa</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="image/LogoEnnio.png" type="image/x-icon">

</head>
<body>

<!-- TOPO -->
<header>
    <img src="image/LogoEnnio.png" alt="Logo da Escola Ennio Chiesa" class="logo">
    <h1>PEI ENNIO CHIESA</h1 class="Title">
</header>

<!-- CONTAINER PRINCIPAL: Notícias no meio + Sidebar na direita -->
<div class="main-wrapper">

    <!-- CONTEÚDO CENTRAL (NOTÍCIAS) -->
    <div class="conteudo-central">

        <!-- CARROSSEL DE NOTÍCIAS -->
        <div class="noticias-carrossel">
            <h2> Notícias</h2>

            <div class="carrossel-container">
                <img id="noticiaImagem" class="carrossel-imagem" src="" alt="Notícia">
                <div id="noticiaDescricao" class="carrossel-descricao"></div>
                <div class="indicadores" id="indicadores"></div>
            </div>
        </div>

        <!-- Você pode adicionar mais conteúdo aqui embaixo se quiser -->

    </div>

    <!-- SIDEBAR DIREITA -->
    <aside class="sidebar-direita">
        <h3> Menu de Navegação</h3>
        <nav>
            <a href="Equipe.html"> Nossa Equipe</a>
            <a href="noticias.html"> Ennio Notícias</a>
            <a href="galeria.html"> Galeria escolar</a>
            <a href="historia.html"> História da escola</a>
            <a href="interclasse.html"> Interclasse e esportes</a>
            <a href="links.html"> Links e redes sociais</a>
            <a href="documentos.html"> Documentos Pedagógicos</a>
        </nav>


<script>
   
    
    const noticias = [
        {
            imagem: "image/focateste.jpg",
            descricao: "meu deus.",
            link: "https://www.exemplo.com/noticia1"
        },
        {
            imagem: "image/galinhateste.jpg",
            descricao: "broo",
            link: "https://www.exemplo.com/noticia2"
        },
        {
            imagem: "image/ratoteste.jpg",
            descricao: "omaigaaaaaaaa",
            link: "https://www.exemplo.com/noticia3"
        },
         {
            imagem: "image/ornintorrincoteste.jpg",
            descricao: "aoba",
            link: "https://www.exemplo.com/noticia4"
        },
        
       
    ];
    

    
    let indiceAtual = 0;
    let intervalo;
    let tempoRestante = 25;
    let timerElement = document.getElementById('timer');
    
    function atualizarNoticia() {
        const noticia = noticias[indiceAtual];
        const imagemElement = document.getElementById('noticiaImagem');
        const descricaoElement = document.getElementById('noticiaDescricao');
        
        // Aplicar fade out
        imagemElement.style.opacity = '0';
        descricaoElement.style.opacity = '0';
        
        setTimeout(() => {
            imagemElement.src = noticia.imagem;
            descricaoElement.innerHTML = noticia.descricao;
            
            // Aplicar fade in
            imagemElement.style.opacity = '1';
            descricaoElement.style.opacity = '1';
        }, 300);
        
        // Atualizar indicadores
        atualizarIndicadores();
        
        // Resetar timer
        tempoRestante = 5;
        if (timerElement) timerElement.textContent = tempoRestante;
    }
    
    function atualizarIndicadores() {
        const indicadoresDiv = document.getElementById('indicadores');
        indicadoresDiv.innerHTML = '';
        
        noticias.forEach((_, index) => {
            const indicador = document.createElement('div');
            indicador.className = 'indicador';
            if (index === indiceAtual) indicador.classList.add('ativo');
            indicador.onclick = () => irParaNoticia(index);
            indicadoresDiv.appendChild(indicador);
        });
    }
    
    function irParaNoticia(index) {
        indiceAtual = index;
        atualizarNoticia();
        resetarTimer();
    }
    
    function proximaNoticia() {
        indiceAtual = (indiceAtual + 1) % noticias.length;
        atualizarNoticia();
        resetarTimer();
    }
    
    function noticiaAnterior() {
        indiceAtual = (indiceAtual - 1 + noticias.length) % noticias.length;
        atualizarNoticia();
        resetarTimer();
    }
    
    function resetarTimer() {
        clearInterval(intervalo);
        tempoRestante = 5;
        if (timerElement) timerElement.textContent = tempoRestante;
        iniciarTimer();
    }
    
    function iniciarTimer() {
        intervalo = setInterval(() => {
            tempoRestante--;
            if (timerElement) timerElement.textContent = tempoRestante;
            
            if (tempoRestante <= 0) {
                proximaNoticia();
            }
        }, 1000);
    }
    
    // Evento de click
    document.addEventListener('click', function(e) {
        const imagem = document.getElementById('noticiaImagem');
        const descricao = document.getElementById('noticiaDescricao');
        
        if (e.target === imagem || e.target === descricao || imagem.contains(e.target) || descricao.contains(e.target)) {
            const link = noticias[indiceAtual].link;
            if (link) {
                window.open(link, '_blank');
            }
        }
    });
    
    // Adicionar estilos de transição
    const estilo = document.createElement('style');
    estilo.textContent = `
        #noticiaImagem, #noticiaDescricao {
            transition: opacity 0.3s ease;
            opacity: 1;
        }
        .carrossel-imagem, .carrossel-descricao {
            cursor: pointer;
        }
    `;
    document.head.appendChild(estilo);
    
    // Iniciar o carrossel
    atualizarIndicadores();
    atualizarNoticia();
    iniciarTimer();
</script>
